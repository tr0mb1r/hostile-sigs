# Hand-curated seed list of hostile publishers and their SDK fingerprints.
#
# Schema per entry:
#   publisher:     human-readable name
#   country:       RU | IR | CN (ISO 3166 alpha-2)
#   package_prefixes: list of Android package-name prefixes (Layer 1)
#   class_prefixes:   list of Java class-name prefixes in their SDK (Layer 4)
#   metadata_keys:    list of AndroidManifest <meta-data> keys (Layer 3)
#   provider_authorities: list of content provider authority substrings (Layer 3)
#   cert_sha256:      list of signing cert SHA-256 fingerprints, colon-hex (Layer 2) — mostly empty until we validate from real APKs
#   sdk_maven:        list of Maven GAV prefixes for future AAR-based validation
#   domain_patterns:  list of tracking domains / FQDNs (Layer 6, signatures v2+)
#   evidence:         URL documenting why this publisher is flagged
#
# Entries marked `status: needs_verification` have fields derived from
# documentation alone and haven't been cross-checked against real APKs.
# Entries marked `status: verified` have had at least one field
# (typically cert_sha256 or class_prefixes) confirmed against a real
# APK or Maven AAR.

