name: Build signatures

on:
  schedule:
    # Daily at 03:00 UTC — early enough that a freshly-committed feed
    # is in place before most-of-day traffic fetches it over VPN.
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "publishers.yaml"
      - "build-signatures.py"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run build-signatures.py
        id: build
        run: |
          uv run build-signatures.py 2>&1 | tee /tmp/build.log

      - name: Check for diff
        id: diff
        run: |
          if git diff --quiet -- signatures.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to signatures.json"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Extract the new version number for the commit message
            VERSION=$(python3 -c "import json; print(json.load(open('signatures.json'))['version'])")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected content change, new version = $VERSION"
            git diff --stat -- signatures.json
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "hostile-sigs bot"
          git config user.email "actions@github.com"
          git add signatures.json
          git commit -m "signatures: v${{ steps.diff.outputs.version }} ($(date -u +%Y-%m-%d))

          Auto-regenerated by .github/workflows/build.yml from publishers.yaml
          and Exodus Privacy tracker cross-reference. See build log in the
          workflow run for field counts.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)"
          git push
